name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
        suite:
          - generate-governance
          - scripts
          - copilot
          - skill-references
          - context-metrics
          - adapter-parity
          - install
          - upgrade
          - detect-architecture
          - detect-toolchain
          - skill-frontmatter
          - e2e
          - governance-lint
          - gemini-e2e
          - spec-drift
          - evidence-validators
          - mutation
          - skill-integration
          - copilot-e2e
          - codex-e2e
          - harness-execution
          - enforcement-fallback
          - template-contract
          - budget-regression
          - task-completion
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install tiktoken

      - name: Setup Go
        if: matrix.suite == 'harness-execution'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install bats-core
        if: matrix.suite == 'mutation'
        run: |
          if ! command -v bats >/dev/null 2>&1; then
            npm install -g bats
          fi

      - name: Run ${{ matrix.suite }} tests
        run: bash tests/test-${{ matrix.suite }}.sh
