name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
        suite:
          - generate-governance
          - scripts
          - skill-references
          - context-metrics
          - adapter-parity
          - install
          - upgrade
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run ${{ matrix.suite }} tests
        run: bash tests/test-${{ matrix.suite }}.sh
